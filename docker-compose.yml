version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Mount database files for persistent data
      - ./db:/app/db
    restart: unless-stopped

  # Development service (uncomment to use)
  # app-dev:
