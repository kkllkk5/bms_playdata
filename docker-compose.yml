  #     context: .
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #     - ./db:/app/db
  #   environment:
  #     - NODE_ENV=development
  #   command: npm run dev